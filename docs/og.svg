<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"
     font-family="-apple-system, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1e8fe6"/>
      <stop offset="55%" stop-color="#3da8ee"/>
      <stop offset="100%" stop-color="#7dc2ee"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7fc352"/>
      <stop offset="40%"  stop-color="#5fa636"/>
      <stop offset="100%" stop-color="#3a7720"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#dff0fa" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#cbe6f5" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="cloudL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloudR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- soft clouds -->
  <ellipse cx="160"  cy="280" rx="220" ry="60"  fill="url(#cloudL)"/>
  <ellipse cx="1040" cy="320" rx="240" ry="70"  fill="url(#cloudR)"/>
  <ellipse cx="640"  cy="160" rx="320" ry="40"  fill="url(#cloudL)" opacity="0.6"/>

  <!-- rolling hill (two layered curves) -->
  <path d="M0,440 C 220,380 400,520 640,460 C 880,400 1020,500 1200,440 L 1200,630 L 0,630 Z"
        fill="url(#hill)"/>
  <path d="M0,500 C 200,460 460,580 700,520 C 940,460 1080,540 1200,500 L 1200,630 L 0,630 Z"
        fill="#3a7720" opacity="0.55"/>

  <!-- subtle highlight ridge -->
  <path d="M0,442 C 220,382 400,522 640,462 C 880,402 1020,502 1200,442"
        fill="none" stroke="#a3d76b" stroke-width="1.6" opacity="0.45" filter="url(#soft)"/>

  <!-- tiny tree silhouette (left) -->
  <g transform="translate(150, 430)" fill="#2d5a18" opacity="0.85">
    <ellipse cx="0" cy="-6" rx="8" ry="14"/>
    <rect x="-1" y="0" width="2" height="8"/>
  </g>
  <!-- tiny structure (right) -->
  <rect x="930" y="430" width="14" height="10" fill="#6e4a2a" opacity="0.85"/>

  <!-- wordmark "ADHD" -->
  <text x="600" y="370" text-anchor="middle"
        font-size="280" font-weight="900" letter-spacing="-8"
        fill="url(#wordmark)">ADHD</text>

  <!-- subtitle -->
  <text x="600" y="450" text-anchor="middle"
        font-size="44" font-weight="700"
        fill="#ffffff" letter-spacing="0.5">For Claude Code</text>
</svg>
