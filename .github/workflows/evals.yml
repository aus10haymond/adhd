name: Evals

# ADHD vs single-shot baseline across the bench/problems.json suite.
# Manual trigger (workflow_dispatch) keeps cost predictable. A scheduled
# weekly run is included but commented out — uncomment once you're ready
# to spend the API budget on continuous tracking.

on:
  workflow_dispatch:
    inputs:
      quick:
        description: "Run only first 2 problems (cheaper)"
        required: false
        default: "false"
  # schedule:
  #   - cron: "0 6 * * 1"   # Mondays 06:00 UTC

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.quick }}" = "true" ]; then
            npm run evals:quick
          else
            npm run evals
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            EVALS.md
            bench/results.json

      - name: Commit EVALS.md (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet EVALS.md; then
            git add EVALS.md
            git commit -m "Update EVALS.md from workflow run ${{ github.run_id }}"
            git push
          else
            echo "No changes to EVALS.md"
          fi
